<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Películas</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #0f0f0f, #1c1c1c);
        color: white;
    }

    header {
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #e50914;
        text-align: center;
        letter-spacing: 2px;
    }

    .contenedor {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        position: relative;
        overflow: hidden;
        border-radius: 15px;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: scale(1.08);
        box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    }

    .card img {
        width: 100%;
        height: 270px;
        object-fit: cover;
    }

    .info {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 10px;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    }

    .titulo {
        font-size: 16px;
        font-weight: bold;
    }

    .boton {
        margin-top: 8px;
        padding: 6px 10px;
        border: none;
        background: #e50914;
        color: white;
        border-radius: 5px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .boton:hover {
        background: #ff1f1f;
    }
</style>
</head>

<body>

<header>🎬 MovieFlix</header>

<div class="contenedor" id="contenedor"></div>

<script>
const peliculas = [
    {
        titulo: "Inception",
        imagen: "https://picsum.photos/300/450?random=1"
    },
    {
        titulo: "Interstellar",
        imagen: "https://picsum.photos/300/450?random=2"
    },
    {
        titulo: "The Dark Knight",
        imagen: "https://picsum.photos/300/450?random=3"
    },
    {
        titulo: "Avatar",
        imagen: "https://picsum.photos/300/450?random=4"
    },
    {
        titulo: "Joker",
        imagen: "https://picsum.photos/300/450?random=5"
    }
];

const contenedor = document.getElementById("contenedor");

peliculas.forEach(p => {
    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <img src="${p.imagen}" alt="${p.titulo}">
        <div class="info">
            <div class="titulo">${p.titulo}</div>
            <button class="boton" onclick="ver('${p.titulo}')">Ver ahora</button>
        </div>
    `;

    contenedor.appendChild(card);
});

function ver(titulo) {
    alert("Reproduciendo: " + titulo);
}
</script>

</body>
</html>
