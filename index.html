<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Películas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .peliculas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pelicula {
            background-color: #222;
            border-radius: 10px;
            margin: 15px;
            padding: 10px;
            width: 200px;
            transition: transform 0.3s;
        }
        .pelicula:hover {
            transform: scale(1.05);
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            margin-top: 10px;
            padding: 8px;
            border: none;
            background-color: #e50914;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Catálogo de Películas 🎬</h1>
    <div class="peliculas" id="contenedor"></div>

    <script>
        const peliculas = [
            {
                titulo: "Inception",
                imagen: "https://via.placeholder.com/200x300?text=Inception"
            },
            {
                titulo: "Interstellar",
                imagen: "https://via.placeholder.com/200x300?text=Interstellar"
            },
            {
                titulo: "The Dark Knight",
                imagen: "https://via.placeholder.com/200x300?text=Batman"
            }
        ];

        const contenedor = document.getElementById("contenedor");

        peliculas.forEach(p => {
            const div = document.createElement("div");
            div.classList.add("pelicula");

            div.innerHTML = `
                <img src="${p.imagen}" alt="${p.titulo}">
                <h3>${p.titulo}</h3>
                <button onclick="verPelicula('${p.titulo}')">Ver</button>
            `;

            contenedor.appendChild(div);
        });

        function verPelicula(titulo) {
            alert("Has seleccionado: " + titulo);
        }
    </script>

</body>
</html>
